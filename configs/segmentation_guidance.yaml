# Segmentation guidance configuration
# Uses SAM2 to guide video generation toward matching a target object mask.

guidance:
  type: segmentation
  model_id: "facebook/sam2-hiera-small"
  guidance_scale: 40.0
  guidance_steps_ratio: 0.5
  loss_type: "bce"

pipeline:
  model_id: "Wan-AI/Wan2.1-I2V-14B-480P-Diffusers"
  num_frames: 33
  num_inference_steps: 30
  cfg_scale: 5.0
  frame_subsample_rate: 4
  grad_clip: 1.0

output:
  fps: 16
  format: "mp4"
