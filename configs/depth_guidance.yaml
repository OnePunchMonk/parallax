# Depth guidance configuration
# Uses Depth-Anything V2 to guide video generation toward a target depth layout.

guidance:
  type: depth
  model_id: "depth-anything/Depth-Anything-V2-Small-hf"
  guidance_scale: 50.0
  guidance_steps_ratio: 0.5
  loss_type: "mse"

pipeline:
  model_id: "Wan-AI/Wan2.1-I2V-14B-480P-Diffusers"
  num_frames: 33
  num_inference_steps: 30
  cfg_scale: 5.0
  frame_subsample_rate: 4
  grad_clip: 1.0

output:
  fps: 16
  format: "mp4"
